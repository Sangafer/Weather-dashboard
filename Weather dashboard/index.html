<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebar" class="oculto">
        <div id="busqueda">
            <div class="input-contenedor">
                <input type="text" id="buscar" placeholder=" ">
                <label for="buscar" id="buscarLabel">Buscar ciudad</label>
            </div>
            <button id="buscarBtn">Buscar</button>
        </div>
        
        <div id="favoritas">
            <h2>Favoritas</h2>
            <ul>
                <li class="item-fav">
                    <span class="nombre-ciudad">Madrid</span>
                    <button class="btn-eliminar">x</button>
                </li>
            </ul>
        </div>
    </div>
    <button id="menuBtn"><img src="assets/menu.png" alt="Menu Icon" id="menuIcon"></button>
    <div id="principal">
        <img src="assets/icono_clima.png" id="icono_clima">
        <h1 id="ciudad">Ciudad</h1>
        <h2 id="temperatura">--°C</h2>
        <div id="max-min">
            Max: --°C Min: --°C
        </div>
        <ul id="prediccion">
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
